<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Maestro Dev</title>
    <link rel="icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root">
      <div id="splash" style="position:fixed;inset:0;background:#000;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif">
        <canvas id="matrix-canvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
        <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px">
          <img src="/icon-512.png" style="width:80px;height:80px;object-fit:contain" />
          <p style="color:#3fb950;font-size:13px;letter-spacing:0.15em;font-family:monospace">MAESTRO DEV</p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        function mostrarError(msg) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;padding:24px;font-family:sans-serif">' +
            '<div style="background:#161b22;border:1px solid #f85149;border-radius:12px;padding:24px;max-width:360px;width:100%;text-align:center">' +
            '<p style="color:#f85149;font-size:14px;font-weight:bold;margin-bottom:8px">Error de carga</p>' +
            '<p style="color:#8b949e;font-size:11px;word-break:break-word;margin-bottom:16px">' + String(msg).substring(0, 300) + '</p>' +
            '<button onclick="location.reload()" style="background:#238636;color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px">Recargar</button>' +
            '</div></div>';
        }
        window.onerror = function (msg, src, line, col, error) {
          mostrarError(error ? error.message : msg);
          return true;
        };
        window.addEventListener('unhandledrejection', function (e) {
          mostrarError(e.reason && e.reason.message ? e.reason.message : String(e.reason));
        });
      })();
    </script>
    <script>
      (function () {
        var canvas = document.getElementById('matrix-canvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var chars = 'SELECT FROM WHERE JOIN GROUP BY HAVING ORDER LIMIT 01アイウエオカキクケコ'.split('');
        var fontSize = 13;
        var cols, drops;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          cols = Math.floor(canvas.width / fontSize);
          drops = Array(cols).fill(1);
        }
        resize();
        window.addEventListener('resize', resize);

        function draw() {
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#0f0';
          ctx.font = fontSize + 'px monospace';
          for (var i = 0; i < drops.length; i++) {
            var c = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillStyle = drops[i] * fontSize < canvas.height * 0.3 ? '#3fb950' : '#1a4731';
            ctx.fillText(c, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
          }
        }

        var raf = setInterval(draw, 50);
        window._stopMatrix = function () { clearInterval(raf); };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
