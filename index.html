<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Maestro Dev</title>
    <link rel="icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root">
      <div id="splash" style="position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;background:#000">
        <img src="/splash-bg.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.85" />
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.6) 100%)"></div>
        <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px">
          <p style="color:#fff;font-size:26px;font-weight:700;letter-spacing:0.08em;font-family:sans-serif;text-shadow:0 0 20px rgba(56,139,253,0.8)">MAESTRO DEV</p>
          <p style="color:#58a6ff;font-size:11px;letter-spacing:0.2em;font-family:monospace;text-shadow:0 0 10px rgba(56,139,253,0.6)">CARGANDO...</p>
        </div>
      </div>
    </div>
    <script>
      (function () {
        function mostrarError(msg) {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div style="position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;padding:24px;font-family:sans-serif">' +
            '<div style="background:#161b22;border:1px solid #f85149;border-radius:12px;padding:24px;max-width:360px;width:100%;text-align:center">' +
            '<p style="color:#f85149;font-size:14px;font-weight:bold;margin-bottom:8px">Error de carga</p>' +
            '<p style="color:#8b949e;font-size:11px;word-break:break-word;margin-bottom:16px">' + String(msg).substring(0, 300) + '</p>' +
            '<button onclick="location.reload()" style="background:#238636;color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px">Recargar</button>' +
            '</div></div>';
        }
        window.onerror = function (msg, src, line, col, error) {
          mostrarError(error ? error.message : msg);
          return true;
        };
        window.addEventListener('unhandledrejection', function (e) {
          mostrarError(e.reason && e.reason.message ? e.reason.message : String(e.reason));
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
